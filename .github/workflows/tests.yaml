name: Automated Tests

on:
  pull_request:

permissions:
  contents: read

# Evita desperdício de minutos cancelando testes de commits antigos na mesma PR
concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  jest:
    name: Jest Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Garante que o job não vai travar rodando infinitamente

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v5 # Removido o fetch-depth: 0 para clonar mais rápido

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json # Garante um mapeamento de cache mais preciso

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
