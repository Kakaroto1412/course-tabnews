name: Automated Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  jest:
    name: Jest ubuntu
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        id: node
        with:
          node-version: "24"
          cache: "npm" # ✅ Cache npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
