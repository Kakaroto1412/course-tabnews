name: Automated Tests

on: pull_request

jobs:
  jest:
    build:
      runs-on: ubuntu-latest
      name: Jest Ubuntu

      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-node@v6
          with:
            node-version: "24"
            package-manager-cache: false

        - run: npm ci

        - run: npm test
