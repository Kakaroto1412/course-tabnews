name: Automated Tests

on: pull_request

jobs:
  jest:
    name: Jest ubuntu
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    # <--- aqui você força o runner a usar Node 24 nas JS actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        id: node
        with:
          node-version: "24"
          package-manager-cache: false

      - run: npm ci

      - run: npm test
