name: Linting

on: pull_request

jobs:
  prettier:
    name: Prettier
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    # <--- aqui você força o runner a usar Node 24 nas JS actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        id: node
        with:
          node-version: 24.x
          cache: npm

      - run: npm ci

      - run: npm run lint:prettier:check
    eslint: # <--- Eslint action
      name: Eslint
      runs-on: ubuntu-latest

      defaults:
        run:
          shell:
            bash

            # <--- aqui você força o runner a usar Node 24 nas JS actions
        env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Setup Node
            uses: actions/setup-node@v4
            id: node
            with:
              node-version: 24.x
              cache: npm

          - run: npm ci

          - run: npm run lint:eslint:check
